<div class="login-page">
  <!-- Logo -->
  <div class="logo-wrapper" [class.logo--animated]="logoAnimated">
    <img src="assets/icons/logo-dark.png" alt="Join Logo" class="logo" />
  </div>

  <!-- Sağ üst: Sign up -->
  <div class="signup-hint">
    <span class="signup-text">Not a Join user?</span>
    <button class="btn-primary" routerLink="/sign-up">Sign up</button>
  </div>

  <!-- Login Formu -->
  <div class="login-container" [class.form--visible]="formVisible">
    <div class="login-card">
      <h1>Log in</h1>
      <div class="title-underline"></div>

      <!-- Fehlermeldung mit @if -->
      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }

      <!-- Login Form mit ngSubmit -->
      <form (ngSubmit)="login()">
        <div class="input-wrapper" [class.error]="emailError">
          <input
            type="email"
            placeholder="Email"
            [(ngModel)]="email"
            name="email"
            required
            #emailInput="ngModel"
            (input)="emailError = false"
          />
          <img src="assets/icons/mail.svg" alt="Email" />
        </div>

        <div class="input-wrapper" [class.error]="passwordError">
          <input
            type="password"
            placeholder="Password"
            [(ngModel)]="password"
            name="password"
            required
            #passwordInput="ngModel"
            (input)="passwordError = false"
          />
          <img src="assets/icons/lock.svg" alt="Password" />
        </div>

        <!-- Lade-Indikator mit @if -->
        @if (isLoading) {
          <div class="loading-spinner">
            <span>Logging in…</span>
          </div>
        }

        <div class="login-buttons">
          <button type="submit" class="btn-primary" [disabled]="isLoading">Log in</button>
          <button type="button" class="btn-outline" (click)="guestLogin()" [disabled]="isLoading">
            Guest Log in
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer: sayfanın en altında -->
  <div class="login-footer">
      <a routerLink="/privacy-policy" data-text="Privacy Policy">Privacy Policy</a>
      <a routerLink="/imprint" data-text="Legal notice">Legal notice</a>
</div>
